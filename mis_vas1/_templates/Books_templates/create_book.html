{% extends 'layout.html' %}

{% block content %}
<button class="btn btn-icon btn-outline-dark" onClick="javascript:history.go(-1);">
    <i class='bx bx-arrow-back'></i>
</button><br><br>

{% comment %} <h4 class="fw-bold py-3 mb-4">Books & Chapter Publication</h4> {% endcomment %}

<div class="card mb-4">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">

                <!-- Staff ID -->
                

                <div class="mb-3 col-md-3">
                    <label for="username" class="form-label">Staff ID</label>
                    <input type="text" class="form-control" id="username" name="username" value="{{username}}" readonly>
                </div>

                <!-- Staff Name -->
                <div class="mb-3 col-md-3">
                    <label for="stf_name" class="form-label">Staff Name</label>
                    <input type="text" class="form-control" id="stf_name" name="stf_name" value="{{stf_name}}" readonly>
                </div>

                <!-- Department Name -->
                <div class="mb-3 col-md-3">
                    <label for="department" class="form-label">Department Name</label>
                    <input type="text" class="form-control" id="department" name="department" value="{{department}}" readonly>
                </div>

                <!-- Publication Type -->
                <div class="mb-3 col-md-3">
                    <label for="publication_type" class="form-label">Publication Type</label>
                    <select class="form-control" name="publication_type" id="publication_type" multiple required>
                        <option value="Book">Book</option>
                        <option value="Chapter">Chapter</option>
                    </select>
                </div>

                <!-- Title of Book / Chapter -->
                <div class="mb-3 col-md-3">
                    <label for="title_of_book_or_chapter" class="form-label">Title of Book / Chapter</label>
                    <input type="text" class="form-control" id="title_of_book_or_chapter" name="title_of_book_or_chapter" required>
                </div>

                <!-- Title of Paper -->
                <div class="mb-3 col-md-3">
                    <label for="title_of_paper" class="form-label">Title of Paper</label>
                    <input type="text" class="form-control" id="title_of_paper" name="title_of_paper">
                </div>

                <!-- Title of Proceedings -->
                <div class="mb-3 col-md-3">
                    <label for="title_of_proceedings" class="form-label">Title of Proceedings</label>
                    <input type="text" class="form-control" id="title_of_proceedings" name="title_of_proceedings">
                </div>

                <!-- Name of Conference -->
                <div class="mb-3 col-md-3">
                    <label for="name_of_conference" class="form-label">Name of Conference</label>
                    <input type="text" class="form-control" id="name_of_conference" name="name_of_conference">
                </div>

                <!-- Year of Publication -->
                <div class="mb-3 col-md-3">
                    <label for="year_of_publication" class="form-label">Year</label>
                    <select class="form-control" id="year_of_publication" name="year_of_publication" required>
                        <option value="" disabled selected>Select Year</option>
                        {% for year in years %}
                            <option value="{{ year }}" {% if year == selected_year %}selected{% endif %}>
                                {{ year }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- National or International -->
                <div class="mb-3 col-md-3">
                    <label for="national_or_international" class="form-label">National or International</label>
                    <select class="form-control" name="national_or_international" id="national_or_international" multiple required>
                        <option value="National">National</option>
                        <option value="International">International</option>
                    </select>
                </div>

                <!-- ISBN / ISSN Number -->
                <div class="mb-3 col-md-3">
                    <label for="isbn_or_issn_number" class="form-label">ISBN/ISSN Number</label>
                    <input type="text" class="form-control" id="isbn_or_issn_number" name="isbn_or_issn_number">
                </div>

                <!-- Affiliating Institute -->
                <div class="mb-3 col-md-3">
                    <label for="affiliating_institute" class="form-label">Affiliating Institute</label>
                    <input type="text" class="form-control" id="affiliating_institute" name="affiliating_institute" required>
                </div>

                <!-- Name of the Publisher -->
                <div class="mb-3 col-md-3">
                    <label for="name_of_the_publisher" class="form-label">Name of the Publisher</label>
                    <input type="text" class="form-control" id="name_of_the_publisher" name="name_of_the_publisher" required>
                </div>
            </div>
            <div class="row">

                <!-- Permission Letter -->
                <div class="mb-3 col-md-3">
                    <label for="conference_cover_page" class="form-label">Conference Cover Page</label>
                    <input type="file" name="file" id="file1" class="form-control" accept="application/pdf" required>
                    <div class="error-message" id="error-file1" style="color: red;"></div>
                    <small style="color: grey;">(PDF only, Max File Size: 2 MB)</small>
                </div>
    
                <!-- Circular -->
                <div class="mb-3 col-md-3">
                    <label for="copy_of_the_chapters" class="form-label">Copy of the Chapters</label>
                    <input type="file" name="file" id="file2" class="form-control" accept="application/pdf" required>
                    <div class="error-message" id="error-file2" style="color: red;"></div>
                    <small style="color: grey;">(PDF only, Max File Size: 2 MB)</small>
                </div>
    
                <!-- Brochure -->
                <div class="mb-3 col-md-3">
                    <label for="index_page" class="form-label">Index Page</label>
                    <input type="file" name="file" id="file3" class="form-control" accept="application/pdf" required>
                    <div class="error-message" id="error-file3" style="color: red;"></div>
                    <small style="color: grey;">(PDF only, Max File Size: 2 MB)</small>
                </div>
    
                <!-- Objective & Outcome -->
                <div class="mb-3 col-md-3">
                    <label for="proof_of_isbn" class="form-label">Proof Of ISBN / ISSN Details</label>
                    <input type="file" name="file" id="file4" class="form-control" accept="application/pdf" required>
                    <div class="error-message" id="error-file4" style="color: red;"></div>
                    <small style="color: grey;">(PDF only, Max File Size: 2 MB)</small>
                </div>

            <!-- Action Buttons -->
            <div class="text-end">
                <button type="submit" class="btn btn-primary">Save</button>
                <a class="btn btn-primary" href="{% url 'book_list' %}">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
<!-- Add MultiSelectTag CSS -->
<link href="https://cdn.jsdelivr.net/gh/habibmhamadi/multi-select-tag@3.0.1/dist/css/multi-select-tag.css" rel="stylesheet">

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Initialize MultiSelectTag
        new MultiSelectTag('publication_type');
        new MultiSelectTag('national_or_international');
        

        // Autofill staff details
        document.getElementById('staff_id').addEventListener('change', function () {
            const selectedOption = this.options[this.selectedIndex];
            document.getElementById('staff_name').value = selectedOption.getAttribute('data-staff-name') || '';
            document.getElementById('department_name').value = selectedOption.getAttribute('data-department') || '';
        });

    });
</script>

     // Populate dropdowns with years in descending order
     const populateYears = (id, start, end, selected) => {
        for (let i = end; i >= start; i--) {
            document.getElementById(id).add(new Option(i, i, false, i == selected));
        }
    };

    // Populate "year_of_activity"
    const startYear = 2000, endYear = 2030;
    populateYears("year_of_publication", startYear, endYear, "{{ request.POST.year_of_publication }}");

    // Handle staff details autofill
    document.getElementById('staff_id').addEventListener('change', function () {
        const selectedOption = this.options[this.selectedIndex];
        document.getElementById('staff_name').value = selectedOption.getAttribute('data-staff-name') || '';
        document.getElementById('department_name').value = selectedOption.getAttribute('data-department') || '';
    });
</script> 

{% endblock %}
