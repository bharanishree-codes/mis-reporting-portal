{% extends 'layout.html' %}
{% block content %}
<div class="card mb-4">
    <div class="card-body">

<h5>Delete Participation Child</h5>
<p>Are you sure you want to delete this child?</p>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="mb-3">
        <input type="submit" class="btn btn-outline-dark" value="Delete"/>
        <a href="{% url 'project_view' child.psk_id %}"><button type="button" class="btn btn-outline-dark">Cancel</button></a>
        

    </div>

    
    
    </div>
</form>
</div>
{% endblock %}
