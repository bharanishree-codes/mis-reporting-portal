{% extends 'layout.html' %}

{% block content %}


<button class="btn btn-icon btn-outline-dark" onClick="javascript:history.go(-1);">
                    <i class='bx bx-arrow-back'></i>
                </button><br><br>

<!-- Include necessary CSS for multi-select -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/habibmhamadi/multi-select-tag@3.0.1/dist/css/multi-select-tag.css">

{% comment %} <h4 class="fw-bold py-3 mb-4">Extension and outreach programmes</h4> {% endcomment %}

<div class="card mb-4">
    <div class="card-body">
        <form method="POST" action="{% url 'extension_create' %}" enctype="multipart/form-data">
            {% csrf_token %}
            
             <div class="row">
                <!-- Department Name -->
                {% comment %} <div class="mb-3 col-md-3">
                    <label for="staff_id" class="form-label">Staff ID</label>
                    <div class="input-group">
                        <select class="form-control" id="staff_id" name="staff_id" required>
                            <option value="" disabled selected>Select Staff ID</option>
                            {% for stf in extension_data %}
                                <option value="{{ stf.stf_id }}"
                                        data-staff-name="{{ stf.stf_name }}"
                                        data-department="{{ stf.department }}">
                                    {{ stf.stf_id }}
                                </option>
                            {% endfor %}
                        </select>
                        <span class="input-group-text">
                            <i class="fas fa-chevron-down"></i>
                        </span>
                    </div>
                </div>  {% endcomment %}

                <!-- Staff Name -->
                <div class="mb-3 col-md-3">
                    <label for="username" class="form-label">Staff ID</label>
                    <input type="text" class="form-control" id="username" name="username" value="{{username}}" readonly>
                </div>
                
                
                <div class="mb-3 col-md-3">
                    <label for="staff_name" class="form-label">Staff Name</label>
                    <input type="text" class="form-control" id="staff_name" name="staff_name" value="{{staff_name}}" readonly>
                </div>

                <!-- Department Name -->
                <div class="mb-3 col-md-3">
                    <label for="department_name" class="form-label">Department Name</label>
                    <input type="text" class="form-control" id="department_name" name="department_name" value="{{department}}" readonly>
                </div>

                <!-- Name of the Activity -->
                <div class="mb-3 col-md-3">
                    <label for="name_of_the_activity" class="form-label">Name of the Activity:</label>
                    <input type="text" class="form-control" id="name_of_the_activity" name="name_of_the_activity" required>
                </div>

                <!-- Organizing Agency -->
                <div class="mb-3 col-md-3">
                    <label for="organizing_agency_collaborating" class="form-label">Organizing Agency/Collaborating Agency:</label>
                    <input type="text" class="form-control" id="organizing_agency_collaborating" name="organizing_agency_collaborating" required>
                </div>

                <!-- Scheme Name -->
                <div class="mb-3 col-md-3">
                    <label for="name_of_the_scheme" class="form-label">Name of the Scheme:</label>
                    <input type="text" class="form-control" id="name_of_the_scheme" name="name_of_the_scheme" required>
                </div>

                <!-- Year of Activity -->
                <div class="mb-3 col-md-3">
                    <label for="year_of_activity" class="form-label">Year of Activity</label>
                    <div class="input-group">
                        <select class="form-control" id="year_of_activity" name="year_of_activity" required>
                            <option value="{{ request.POST.year_of_activity }}" disabled selected>Select Year</option> <!-- Default placeholder option -->
                        </select>
                    </div>
                </div>

                {% comment %} <div class="mb-3 col-md-3">
                    <label for="year_of_activity" class="form-label">Year of Activity:</label>
                    <input type="number" class="form-control" id="year_of_activity" name="year_of_activity" required>
                </div> {% endcomment %}

                <!-- Number of Students -->
                <div class="mb-3 col-md-3">
                    <label for="number_of_students" class="form-label">Number of Students:</label>
                    <input type="number" class="form-control" id="number_of_students" name="number_of_students" required>
                </div>

                <!-- Number of Beneficiaries -->
                <div class="mb-3 col-md-3">
                    <label for="number_of_beneficiaries" class="form-label">Number of Beneficiaries:</label>
                    <input type="number" class="form-control" id="number_of_beneficiaries" name="number_of_beneficiaries" required>
                </div>
            {% comment %} </div>
    </div>
</div>


<div class="card">
    <h5 class="card-header">Upload Documents</h5>
    <div class="card-body">
        <div class="row"> {% endcomment %}
            <!-- Permission Letter -->
            <div class="mb-3 col-md-3">
                <label for="Permission_Letter" class="form-label">Permission Letter</label>
                <input type="file" name="file" id="file1" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file1" style="color: red;"></div>
            </div>

            <!-- Circular -->
            <div class="mb-3 col-md-3">
                <label for="Circular" class="form-label">Circular</label>
                <input type="file" name="file" id="file2" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file2" style="color: red;"></div>
            </div>

            <!-- Brochure -->
            <div class="mb-3 col-md-3">
                <label for="Brochure" class="form-label">Brochure</label>
                <input type="file" name="file" id="file3" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file3" style="color: red;"></div>
            </div>

            <!-- Objective & Outcome -->
            <div class="mb-3 col-md-3">
                <label for="Objective" class="form-label">Objective & Outcome</label>
                <input type="file" name="file" id="file4" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file4" style="color: red;"></div>
            </div>

            <!-- Detailed Report -->
            <div class="mb-3 col-md-3">
                <label for="Detailed_Report" class="form-label">Detailed Report</label>
                <input type="file" name="file" id="file5" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file5" style="color: red;"></div>
            </div>

            <!-- Geo Tagged Photos -->
            <div class="mb-3 col-md-3">
                <label for="Geo_Tagged_Photos" class="form-label">Geo Tagged Photos</label>
                <input type="file" name="file" id="file6" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file6" style="color: red;"></div>
            </div>

            <!-- Student Attendance with Signature -->
            <div class="mb-3 col-md-3">
                <label for="Student_Attendance" class="form-label">Student Attendance with Signature</label>
                <input type="file" name="file" id="file7" class="form-control" accept="application/pdf" required>
                <div class="error-message" id="error-file7" style="color: red;"></div>
            </div>
        </div>
        <div class="text-end">
            <button type="submit" class="btn btn-primary">submit</button>
            <a href="{% url 'extension_list' %}"><button type="button" class="btn btn-primary">Cancel</button></a>
        </div>
    </div>
</div>

<!-- Submit Button -->

</form>
</div>
</div>

<!-- Include necessary JS for multi-select -->
<script src="https://cdn.jsdelivr.net/gh/habibmhamadi/multi-select-tag@3.0.1/dist/js/multi-select-tag.js"></script>
<script>
    new MultiSelectTag('userrole'); // id
</script>

<script>
    document.getElementById('staff_id').addEventListener('change', function () {
        const selectedOption = this.options[this.selectedIndex];
        const staffName = selectedOption.getAttribute('data-staff-name');
        const department = selectedOption.getAttribute('data-department');

        // Populate the respective input fields
        document.getElementById('staff_name').value = staffName || '';
        document.getElementById('department_name').value = department || '';
    });
</script>

<script>
    // Populate dropdowns with years
    const populateYears = (id, start, end, selected) => {
        for (let i = start; i <= end; i++) {
            document.getElementById(id).add(new Option(i, i, false, i == selected));
        }
    };

    // Populate "year_of_offering" and "times_offered_in_year"
    const startYear = 2000, endYear = 2030;
    populateYears("year_of_activity", startYear, endYear, "{{ request.POST.year_of_activity }}");
</script>

{% endblock %}
