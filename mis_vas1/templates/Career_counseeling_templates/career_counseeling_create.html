{% extends 'layout.html' %}

{% block content %}

<!-- Back Button -->
<button class="btn btn-icon btn-outline-dark" onclick="javascript:history.go(-1);">
    <i class="bx bx-arrow-back"></i>
</button><br><br>
{{stf}}
<!-- Include necessary CSS for multi-select -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/habibmhamadi/multi-select-tag@3.0.1/dist/css/multi-select-tag.css">

<!-- Page Title -->

<!-- Career Counseling Create Form -->
<form method="POST" action="{% url 'career_counseeling_create' %}" enctype="multipart/form-data">
    {% csrf_token %}
    
    <!-- Staff and Department Section -->
    <center><h4 class="fw-bold py-3 mb-4">Number of students benefited by Guidance For career counselling</h4></center>
    <div class="card mb-4">
        <div class="card-body">
            <div class="row">
                <!-- Staff ID -->
                {% comment %} <div class="mb-3 col-md-3">
                    <label for="staff_id" class="form-label">Staff ID</label>
                    <div class="input-group">
                        <select class="form-control" id="staff_id" name="staff_id" required>
                            <option value="" disabled selected>Select Staff ID</option>
                            {% for stf in career_data %}
                                <option value="{{ stf.stf_id }}"
                                        data-staff-name="{{ stf.stf_name }}"
                                        data-department="{{ stf.department }}">
                                    {{ stf.stf_id }}
                                </option>
                            {% endfor %}
                        </select>
                        <span class="input-group-text">
                            <i class="fas fa-chevron-down"></i>
                        </span>
                    </div>
                </div> {% endcomment %}

                <!-- Staff Name -->
                <div class="mb-3 col-md-3">
                    <label for="username" class="form-label">Staff ID</label>
                    <input type="text" class="form-control" id="username" name="username" value="{{username}}" readonly>
                </div>
                
                
                <div class="mb-3 col-md-3">
                    <label for="staff_name" class="form-label">Staff Name</label>
                    <input type="text" class="form-control" id="staff_name" name="staff_name" value="{{staff_name}}" readonly>
                </div>
                
                <!-- Department Name -->
                <div class="mb-3 col-md-3">
                    <label for="department" class="form-label">Department Name</label>
                    <input type="text" class="form-control" id="department" name="department_name" value="{{department}}" readonly>
                </div>

                <!-- Year of Activity -->
                <!-- Year of Activity - Changed to select dropdown -->
<div class="mb-3 col-md-3">
    <label for="year_of_activity" class="form-label">Year of Activity</label>
    <select class="form-control" id="year_of_activity" name="year_of_activity" required>
        <option value="" disabled selected>Select Year</option>
        {% for year in publication_year %}
            <option value="{{ year }}">{{ year }}</option>
        {% endfor %}
    </select>
</div>

                <!-- Counseling Details -->
                <div class="mb-3 col-md-3">
                    <label for="counseling_detail" class="form-label">Details of Career Counseling</label>
                    <input type="text" class="form-control" id="counseling_detail" name="counseling_detail" required>
                </div>

                <!-- Number of Students Attended -->
                <div class="mb-3 col-md-3">
                    <label for="number_of_students_attended" class="form-label">Number of Students Attended</label>
                    <input type="text" class="form-control" id="number_of_students_attended" name="number_of_students_attended" required>
                </div>

                <!-- Number of Students Placed -->
                <div class="mb-3 col-md-3">
                    <label for="number_of_students_placed" class="form-label">Number of Students Placed</label>
                    <input type="text" class="form-control" id="number_of_students_placed" name="number_of_students_placed" required>
                </div>
            {% comment %} </div>
        </div>
    </div>

    <!-- Document Upload Section -->
    <div class="card">
        <div class="card-body">
            <div class="row"> {% endcomment %}
                <!-- Permission Letter -->
                <div class="col-md-3 mb-3">
                    <label for="permission_letter" class="form-label">Permission Letter</label>
                    <input type="file" name="file" id="file" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file" style="color: red;"></div>
                </div>

                <!-- Circular -->
                <div class="col-md-3 mb-3">
                    <label for="circular" class="form-label">Circular</label>
                    <input type="file" name="file" id="file" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file" style="color: red;"></div>
                </div>

                <!-- Brochure -->
                <div class="col-md-3 mb-3">
                    <label for="brochure" class="form-label">Brochure</label>
                    <input type="file" name="file" id="file" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file" style="color: red;"></div>
                </div>

                <!-- Objective & Outcome -->
                <div class="col-md-3 mb-3">
                    <label for="objective_outcome" class="form-label">Resource person profile</label>
                    <input type="file" name="file" id="file" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file" style="color: red;"></div>
                </div>

                <!-- Detailed Report -->
                <div class="col-md-3 mb-3">
                    <label for="detailed_report" class="form-label">Detailed Report-Objective & Outcome</label>
                    <input type="file" name="file" id="file" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file" style="color: red;"></div>
                </div>

                <!-- Geo Tagged Photos -->
                <div class="col-md-3 mb-3">
                    <label for="geo_tagged_photos" class="form-label">Geo Tagged Photos</label>
                    <input type="file" name="file" id="file" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file" style="color: red;"></div>
                </div>

                <!-- Student Attendance with Signature -->
                <div class="col-md-3 mb-3">
                    <label for="student_attendance" class="form-label">Student Attendance</label>
                    <input type="file" name="file" id="file" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file" style="color: red;"></div>
                </div>
            
                <div class="col-md-3 mb-3">
                    <label for="student_attendance" class="form-label">Feedback</label>
                    <input type="file" name="file" id="file" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file" style="color: red;"></div>
                </div>
            
                <div class="col-md-3 mb-3">
                    <label for="student_attendance" class="form-label">Certificate sample</label>
                    <input type="file" name="file" id="file" class="form-control" accept="application/pdf" required>
<div class="error-message" id="error-file" style="color: red;"></div>
                </div>
            </div>
            <div class="text-end mt-3">
                <button type="submit" class="btn btn-primary">Create</button>
                <a href="{% url 'career_counseeling_list' %}" class="btn btn-primary">Cancel</a>
            </div>
        </div>
    </div>

    <!-- Submit and Cancel Buttons -->
</form>

<!-- Include Multi-Select JS -->
<script src="https://cdn.jsdelivr.net/gh/habibmhamadi/multi-select-tag@3.0.1/dist/js/multi-select-tag.js"></script>
<script>
    new MultiSelectTag('userrole'); // Initialize multi-select
</script>

<!-- Script to Populate Staff Name and Department -->
<script>
    document.getElementById('staff_id').addEventListener('change', function () {
        const selectedOption = this.options[this.selectedIndex];
        const staffName = selectedOption.getAttribute('data-staff-name');
        const department = selectedOption.getAttribute('data-department');

        // Populate the respective input fields
        document.getElementById('staff_name').value = staffName || '';
        document.getElementById('department_name').value = department || '';
    });
</script>

{% endblock %}
